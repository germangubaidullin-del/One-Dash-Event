<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ type_name }} – Інгредієнти</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="background-grid">
    <header>
        <img src="{{ url_for('static', filename='logo-small.png') }}" class="logo-small" alt="Logo">
        <h1>One Dash Event</h1>
    </header>

    <nav>
        <a href="/" class="button">Головна</a>
        <a href="/cocktails" class="button">Усі коктейлі</a>
        <a href="/glass" class="button">Посуд</a>
        <a href="/search/event" class="button">Категорія</a>
        <a href="/search/ingredients" class="button">Інгредієнти</a>
    </nav>

    <h1 class="title">{{ type_name }}</h1>

    <main class="card-list">
        {% for ing in ingredients %}
        <a href="{{ url_for('ingredient_detail', name=ing.name) }}" class="card-link">
            <div class="cocktail-card">
                <img src="{{ url_for('static', filename='images/' + (ing.image or 'placeholder.webp')) }}" alt="{{ ing.name }}">
                <h3>{{ ing.name }}</h3>
                <p>{{ ing.short_description }}</p>
            </div>
        </a>
        {% endfor %}
    </main>
</body>
</html>
